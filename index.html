<style>
  :root{
    --script:"Great Vibes", cursive;
    --serif:"Cormorant Garamond", Georgia, serif;
    --white:#fdfdfb;
    --soft:rgba(255,255,255,0.82);
    --max:760px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--serif); color:var(--white);
    font-size:21px; line-height:1.75;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ===== Cinematic train intro ===== */
  .intro{position:fixed; inset:0; z-index:100; background:#000; overflow:hidden;
    animation:introOut 1.1s ease 3.7s forwards;}
  .intro img{position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center 42%;
    transform:scale(1.02); transform-origin:50% 44%;
    animation:approach 3.9s cubic-bezier(0.55,0.06,0.68,0.19) forwards; will-change:transform,filter;}
  @keyframes approach{
    0%{transform:scale(1.02); filter:brightness(.82) blur(0);}
    55%{transform:scale(1.55); filter:brightness(.95) blur(0);}
    100%{transform:scale(2.9); filter:brightness(1.9) blur(7px);}}
  .intro .flash{position:absolute; inset:0; background:#fff; opacity:0; animation:flash 3.9s ease-in forwards;}
  @keyframes flash{0%,72%{opacity:0;}90%{opacity:.85;}100%{opacity:1;}}
  @keyframes introOut{to{opacity:0; visibility:hidden;}}
  .skip{position:fixed; right:18px; bottom:16px; z-index:101;
    font-family:var(--serif); font-size:14px; letter-spacing:.08em; color:rgba(255,255,255,.75);
    background:transparent; border:1px solid rgba(255,255,255,.45); border-radius:2px;
    padding:7px 14px; cursor:pointer; text-transform:uppercase; animation:introOut 1.1s ease 3.7s forwards;}
  .skip:hover{color:#fff; border-color:#fff;}

    filter:blur(3px) brightness(0.74); transform:scale(1.06);}
  .bg-tint{position:fixed; inset:0; z-index:-1;
    background:linear-gradient(180deg, rgba(20,28,18,0.45) 0%, rgba(20,28,18,0.25) 40%, rgba(20,28,18,0.6) 100%);}

  .wrap{max-width:var(--max); margin:0 auto; padding:0 28px;}

  /* page reveals after intro */
  .page{opacity:0; animation:pageIn 1.2s ease 4.4s forwards;}
  @keyframes pageIn{from{opacity:0; transform:translateY(14px);}to{opacity:1; transform:none;}}

  .hero{min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:80px 24px;}
  .hero .greeting{font-style:italic; font-size:clamp(20px,3vw,26px); color:var(--soft);}
  .hero h1{font-family:var(--script); font-size:clamp(64px,16vw,150px); line-height:1; margin:6px 0 14px;
    text-shadow:0 4px 30px rgba(0,0,0,.45);}
  .hero .tagline{font-size:clamp(18px,2.6vw,24px); color:var(--soft); max-width:30ch; font-style:italic;}
  .hero .divider{width:64px; height:1px; background:rgba(255,255,255,.55); margin:26px auto;}
  .hero .place{letter-spacing:.34em; text-transform:uppercase; font-size:13px; color:var(--soft);}
  .scroll-cue{margin-top:48px; font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:var(--soft);}
  .scroll-cue::after{content:"❧"; display:block; font-size:20px; margin-top:6px; animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  main{padding:40px 0 30px;}
  .card{background:rgba(18,24,16,0.42); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.16); border-radius:4px; padding:38px 36px; margin-bottom:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.28);}
  .card h2{font-family:var(--script); font-size:clamp(34px,6vw,46px); line-height:1; margin-bottom:16px;
    text-shadow:0 2px 18px rgba(0,0,0,.4);}
  .card p{color:var(--soft);}
  .card p + p{margin-top:12px;}

  .contacts{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px;}
  .contacts a{flex:1 1 170px; min-height:52px; display:inline-flex; align-items:center; justify-content:center;
    text-decoration:none; font-size:19px; letter-spacing:.06em; color:var(--white);
    border:1px solid rgba(255,255,255,.55); border-radius:3px; padding:0 20px;
    transition:background .3s ease, color .3s ease;}
  .contacts a:hover{background:var(--white); color:#1b2417;}
  .contacts a:focus-visible{outline:3px solid var(--white); outline-offset:3px;}

  footer{text-align:center; padding:30px 0 60px; color:var(--soft);}
  footer .mind{font-family:var(--script); font-size:30px; color:var(--white);}
  footer .copy{font-size:14px; font-style:italic; margin-top:4px;}

  @media (prefers-reduced-motion: reduce){
    .intro,.skip{display:none;} .page{opacity:1; animation:none;}}

  .roundel{--r:66px; width:var(--r); height:var(--r); margin:30px auto 0; position:relative; filter:drop-shadow(0 2px 14px rgba(0,0,0,.4));}
  .roundel .rd-ring{position:absolute; inset:0; border-radius:50%; border:11px solid #fff;}
  .roundel .rd-bar{position:absolute; left:-12%; right:-12%; top:50%; transform:translateY(-50%); height:13px; background:#fff;}
  .note{min-height:46vh; display:flex; align-items:center; justify-content:center; text-align:center; font-style:italic; font-size:clamp(20px,3.4vw,28px); color:var(--soft);}
</style>
</head>
